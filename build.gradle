plugins {
    id 'java'
    id 'application'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

sourceCompatibility = '11'
targetCompatibility = '11'

application {
    mainClass = 'com.example.App'
}

dependencies {
    // JUnit for testing
    testImplementation 'junit:junit:4.13.2'
}

tasks.named('test') {
    useJUnit()
}

